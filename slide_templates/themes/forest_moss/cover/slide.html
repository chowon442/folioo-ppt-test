<section class="slide sh-slide slide--cover-nature"
    data-template="cover"
    data-sh-dsl="slidehtml/v1"
    data-sh-id="cover-forest-moss"
    data-sh-template="cover"
    data-sh-size="1280x720">
    <div class="cover-bg sh-node" data-sh-kind="flatten" data-sh-role="background" data-sh-export="flatten" aria-hidden="true"></div>
    <div class="cover-accent cover-accent--stripe sh-node" data-sh-kind="shape" data-sh-role="accent" data-sh-shape="rect" data-sh-export="native" aria-hidden="true"></div>
    <div class="cover-accent cover-accent--orb sh-node" data-sh-kind="shape" data-sh-role="accent" data-sh-shape="ellipse" data-sh-export="native" aria-hidden="true"></div>
    <div class="cover-panel sh-node" data-sh-kind="shape" data-sh-role="panel" data-sh-shape="round-rect" data-sh-export="native" aria-hidden="true"></div>
    <div class="cover-content">
        <div class="cover-title sh-node" data-sh-kind="text" data-sh-role="title" data-sh-fit="shrink" data-sh-max-lines="2" data-sh-export="native">
            <p>프로젝트 제목이 여기에 들어갑니다</p>
        </div>
        <div class="cover-subtitle sh-node" data-sh-kind="text" data-sh-role="subtitle" data-sh-fit="truncate" data-sh-max-lines="3" data-sh-export="native">
            <p>부제목 또는 한 줄 요약 설명</p>
        </div>
        <div class="cover-author sh-node" data-sh-kind="text" data-sh-role="author" data-sh-fit="none" data-sh-max-lines="1" data-sh-export="native">
            <p>작성자명</p>
        </div>
    </div>
</section>
