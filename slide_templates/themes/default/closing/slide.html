<section class="slide sh-slide slide--closing-default"
    data-template="closing"
    data-sh-dsl="slidehtml/v1"
    data-sh-id="closing-default"
    data-sh-template="closing"
    data-sh-size="1280x720">
    <div class="closing-bg sh-node" data-sh-kind="flatten" data-sh-role="background" data-sh-export="flatten" aria-hidden="true"></div>
    <div class="closing-accent closing-accent--stripe sh-node" data-sh-kind="shape" data-sh-role="accent" data-sh-shape="rect" data-sh-export="native" aria-hidden="true"></div>
    <div class="closing-panel sh-node" data-sh-kind="shape" data-sh-role="panel" data-sh-shape="round-rect" data-sh-export="native" aria-hidden="true"></div>
    <div class="closing-content">
        <div class="closing-message sh-node" data-sh-kind="text" data-sh-role="message" data-sh-fit="shrink" data-sh-max-lines="2" data-sh-export="native">
            <p>감사합니다</p>
        </div>
        <div class="closing-subtitle sh-node" data-sh-kind="text" data-sh-role="subtitle" data-sh-fit="truncate" data-sh-max-lines="2" data-sh-export="native">
            <p>함께 일할 기회를 기다리고 있습니다</p>
        </div>
        <div class="closing-contact sh-node" data-sh-kind="text" data-sh-role="contact" data-sh-fit="truncate" data-sh-max-lines="3" data-sh-export="native">
            <p>email@example.com</p>
        </div>
    </div>
</section>
