<section class="slide sh-slide slide--quote-default"
    data-template="quote"
    data-sh-dsl="slidehtml/v1"
    data-sh-id="quote-default"
    data-sh-template="quote"
    data-sh-size="1280x720">
    <div class="quote-bg sh-node" data-sh-kind="flatten" data-sh-role="background" data-sh-export="flatten" aria-hidden="true"></div>
    <div class="quote-panel sh-node" data-sh-kind="shape" data-sh-role="panel" data-sh-shape="round-rect" data-sh-export="native" aria-hidden="true"></div>
    <div class="quote-rule sh-node" data-sh-kind="shape" data-sh-role="rule" data-sh-shape="rect" data-sh-export="native" aria-hidden="true"></div>
    <div class="quote-content">
        <div class="quote-kicker sh-node" data-sh-kind="text" data-sh-role="title" data-sh-fit="none" data-sh-max-lines="1" data-sh-export="native">
            <p>핵심 메시지</p>
        </div>
        <div class="quote-text sh-node" data-sh-kind="text" data-sh-role="quote" data-sh-fit="shrink" data-sh-max-lines="6" data-sh-export="native">
            <p>미션과 가치를 한 줄로 전달하는 인용문이 들어갑니다.</p>
        </div>
        <div class="quote-attribution sh-node" data-sh-kind="text" data-sh-role="attribution" data-sh-fit="truncate" data-sh-max-lines="2" data-sh-export="native">
            <p>— 출처</p>
        </div>
    </div>
</section>
